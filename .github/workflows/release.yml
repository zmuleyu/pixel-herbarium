name: Release to App Store

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_validate:
        description: 'Skip validation (TypeScript + Jest)'
        type: boolean
        default: false

# Prevent duplicate release runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (TypeScript + Jest)
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_validate }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --ci --passWithNoTests

  build-submit:
    name: Build IPA (local) + Submit to ASC
    needs: validate
    if: ${{ !cancelled() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      # eas-cli is in devDependencies (^18.4.0), installed by npm ci.
      # Credentials are downloaded from EAS servers via EXPO_TOKEN.
      # Distribution Certificate + App Store Provisioning Profile configured 2026-03-20.
      - name: Build production IPA locally
        run: |
          set -e
          npx eas build --local \
            --profile production \
            --platform ios \
            --non-interactive \
            --output production.ipa
          ls -lh production.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: production-ipa-${{ github.sha }}
          path: production.ipa
          retention-days: 7

      - name: Submit to App Store Connect
        run: |
          set -e
          npx eas submit \
            --platform ios \
            --path production.ipa \
            --non-interactive
