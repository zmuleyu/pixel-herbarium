name: Release to App Store

on:
  push:
    tags: ['v*']

# Prevent duplicate release runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (TypeScript + Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --ci --passWithNoTests

  build-submit:
    name: EAS Build + Submit to App Store Connect
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: 'npm'
      - run: npm ci
      # Build production IPA and auto-submit to App Store Connect in one step.
      # Requires: EXPO_TOKEN (GitHub Secret) + Apple credentials stored in EAS
      # (set up once via: npx eas submit --platform ios, then select "Save credentials to EAS")
      - run: eas build --profile production --platform ios --non-interactive --auto-submit
