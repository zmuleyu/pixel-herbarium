name: Release to App Store

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_validate:
        description: 'Skip validation (TypeScript + Jest)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (TypeScript + Jest)
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_validate }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --ci --passWithNoTests

  build-submit:
    name: Build IPA (native) + Submit to ASC
    needs: validate
    if: ${{ !cancelled() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://uwdgnueaycatmkzkbxwo.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      IOS_DIST_P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
      IOS_DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
      BUNDLE_ID: com.pixelherbarium.app
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      - name: Prepare native iOS project
        run: bash scripts/ios-build-setup.sh production

      - name: Configure signing keychain
        run: bash scripts/ios-keychain-signing.sh

      - name: Build production IPA
        run: bash scripts/ios-build-archive.sh app-store production.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: production-ipa-${{ github.sha }}
          path: production.ipa
          retention-days: 7

      - name: Submit to App Store Connect
        run: |
          npx eas submit \
            --platform ios \
            --path production.ipa \
            --non-interactive
