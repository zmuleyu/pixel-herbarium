name: Preview Build (Reviewer Run)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Preview IPA (local, no EAS quota)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      - name: Build preview IPA locally
        run: |
          set -e
          npx eas build --local \
            --profile preview \
            --platform ios \
            --non-interactive \
            --output preview.ipa
          ls -lh preview.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: preview-ipa-${{ github.sha }}
          path: preview.ipa
          retention-days: 3
