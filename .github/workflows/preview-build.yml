name: Preview Build (Internal Testing)

on:
  workflow_dispatch:
    inputs:
      skip_validate:
        description: 'Skip TypeScript + Jest validation'
        type: boolean
        default: false

concurrency:
  group: preview-build
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (TypeScript + Jest)
    if: ${{ !inputs.skip_validate }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --ci --passWithNoTests

  build:
    name: Build Preview IPA (Ad Hoc)
    needs: validate
    if: ${{ !cancelled() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://uwdgnueaycatmkzkbxwo.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      IOS_DIST_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      IOS_DIST_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.ADHOC_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: 68JA8V8NC2
      BUNDLE_ID: com.pixelherbarium.app
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      - name: Prepare native iOS project
        run: bash scripts/ios-build-setup.sh preview

      - name: Configure signing keychain
        run: bash scripts/ios-keychain-signing.sh

      - name: Build preview IPA
        run: bash scripts/ios-build-archive.sh ad-hoc preview.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-ipa-${{ github.sha }}
          path: preview.ipa
          retention-days: 7

      - name: Upload build diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-build-diagnostics-${{ github.sha }}
          path: |
            build/*.xcresult
            build/export-options/*.plist
          retention-days: 7
