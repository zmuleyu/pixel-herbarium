name: Preview Build (Internal Testing)
run-name: Preview Build / ${{ github.ref_name }} / ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      skip_validate:
        description: 'Skip TypeScript + Jest validation'
        type: boolean
        default: false

concurrency:
  group: preview-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  validate:
    name: Validate (TypeScript + Jest)
    if: ${{ !inputs.skip_validate }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --ci --passWithNoTests

  build:
    name: Build Preview IPA (Ad Hoc)
    needs: validate
    if: ${{ !cancelled() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://uwdgnueaycatmkzkbxwo.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      IOS_DIST_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      IOS_DIST_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.ADHOC_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: 68JA8V8NC2
      BUNDLE_ID: com.pixelherbarium.app
      EXPECTED_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      - name: Check EAS build quota (advisory)
        run: |
          COUNT=$(npx eas build:list --platform ios --limit 10 --json 2>/dev/null | \
            node -e "
              const d=require('fs').readFileSync('/dev/stdin','utf8');
              const arr=JSON.parse(d);
              const now=new Date();
              const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
              console.log(arr.filter(b=>new Date(b.createdAt)>=monthStart).length);
            ")
          echo "EAS builds this month: $COUNT / 10"
          if [ "$COUNT" -ge 8 ]; then
            echo "::warning::EAS Free quota nearly exhausted ($COUNT/10). Use GHA-only path for Dev Build."
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Gate 1 - Verify workflow ref
        run: bash scripts/ios-ref-gate.sh

      - name: Gate 2 - Prepare native iOS project
        run: bash scripts/ios-build-setup.sh preview

      - name: Configure signing keychain
        run: bash scripts/ios-keychain-signing.sh

      - name: Gate 3 - Build preview IPA
        run: bash scripts/ios-build-archive.sh ad-hoc preview.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: preview-ipa-${{ github.sha }}
          path: preview.ipa
          retention-days: 7

      - name: Upload build diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-build-diagnostics-${{ github.sha }}
          path: |
            build/*.xcresult
            build/export-options/*.plist
            build/diagnostics/**
          retention-days: 7
          if-no-files-found: ignore
