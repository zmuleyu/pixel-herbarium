name: Screenshot Build (simulator-screenshot)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Simulator App for Screenshots
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Screenshot-mode env vars (from eas.json simulator-screenshot profile)
      EXPO_PUBLIC_SUPABASE_URL: "https://uwdgnueaycatmkzkbxwo.supabase.co"
      EXPO_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3ZGdudWVheWNhdG1remtieHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTEwMTIsImV4cCI6MjA4OTA2NzAxMn0.ShB7IWQCZ1L3OQi53PqbVVNIJmvUSml0t7Dy15g_clg"
      EXPO_PUBLIC_SCREENSHOT_MODE: "true"
      APP_VARIANT: "development"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (required for Expo SDK 55)
        run: |
          echo "Available Xcode installations:"
          ls /Applications/ | grep -i xcode || true
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          TARGET="${XCODE26:-$LATEST}"
          echo "Selecting: $TARGET"
          sudo xcode-select -s "$TARGET/Contents/Developer"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      - name: Inject screenshot-mode env vars into .env.local
        run: |
          cat > .env.local << 'EOF'
          EXPO_PUBLIC_SCREENSHOT_MODE=true
          EXPO_PUBLIC_SUPABASE_URL=https://uwdgnueaycatmkzkbxwo.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3ZGdudWVheWNhdG1remtieHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTEwMTIsImV4cCI6MjA4OTA2NzAxMn0.ShB7IWQCZ1L3OQi53PqbVVNIJmvUSml0t7Dy15g_clg
          NO_PROXY=localhost,127.0.0.1,::1,0.0.0.0
          EOF
          echo "✓ .env.local written:"
          cat .env.local

      - name: Patch node_modules for Xcode 26 compatibility
        run: |
          # 1. Downgrade Swift version: 6.0 -> 5.9 in podspec
          sed -i '' "s/s\.swift_version  = '6\.0'/s.swift_version  = '5.9'/" \
            node_modules/expo-modules-core/ExpoModulesCore.podspec

          # 2. Remove @MainActor from conformance lists (Swift 6 syntax, not valid in 5.9)
          HOSTING="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          VIRTUAL="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift"
          VIEWDEF="node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift"
          sed -i '' 's/, @MainActor AnyExpoSwiftUIHostingView/, AnyExpoSwiftUIHostingView/' "$HOSTING"
          sed -i '' 's/: @MainActor ExpoSwiftUI\.ViewWrapper/: ExpoSwiftUI.ViewWrapper/' "$VIRTUAL"
          sed -i '' 's/extension UIView: @MainActor AnyArgument {/extension UIView: AnyArgument {/' "$VIEWDEF"

          echo "=== Verification ==="
          grep "swift_version" node_modules/expo-modules-core/ExpoModulesCore.podspec

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      - name: Patch folly headers (disable coroutines for Xcode 26+)
        run: |
          # ReactNativeDependencies bundles folly as a pre-built XCFramework.
          # Clang module caching ignores consumer compiler flags (-DFOLLY_CFG_NO_COROUTINES=1),
          # so we must patch the header files directly after pod install.
          # Step 1: Replace symlinks with real files (sed -i fails on symlinks)
          find ios/Pods -name '*.h' -path '*/folly/*' -type l 2>/dev/null | while read f; do
            cp -L "$f" "$f.tmp" && mv "$f.tmp" "$f"
          done
          # Step 2: Patch FOLLY_HAS_COROUTINES checks
          PATCHED=0
          for f in $(find ios/Pods -name '*.h' -path '*/folly/*' -type f 2>/dev/null); do
            if grep -q '#if FOLLY_HAS_COROUTINES' "$f" 2>/dev/null; then
              sed -i '' 's/#if FOLLY_HAS_COROUTINES/#if 0 \/* FOLLY_HAS_COROUTINES disabled *\//' "$f"
              echo "Patched: $f"
              PATCHED=$((PATCHED + 1))
            fi
          done
          echo "Total files patched: $PATCHED"

      - name: Build simulator app
        run: |
          set -eo pipefail
          cd ios
          xcodebuild \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcodebuild.log | tail -80
          echo "=== Build succeeded ==="

      - name: Package simulator app
        run: |
          set -e
          APP=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found in ios/build"
            find ios/build -type d -maxdepth 4 || true
            exit 1
          fi
          echo "Found: $APP"
          tar czf screenshot-sim.tar.gz -C "$(dirname "$APP")" "$(basename "$APP")"
          ls -lh screenshot-sim.tar.gz

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-sim-${{ github.sha }}
          path: screenshot-sim.tar.gz
          retention-days: 3

      - name: Boot Simulator & install app
        run: |
          set -e
          APP=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found in ios/build"
            exit 1
          fi
          echo "App: $APP"

          # Select best available iPhone simulator — extract UDID
          UDID=""
          for MODEL in "iPhone 17 Pro Max" "iPhone 17 Pro" "iPhone 17" "iPhone Air" "iPhone 16 Pro Max" "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro Max"; do
            UDID=$(xcrun simctl list devices available 2>/dev/null \
              | grep "$MODEL" | head -1 \
              | grep -oE '[A-F0-9-]{36}')
            if [ -n "$UDID" ]; then
              echo "Selected: $MODEL ($UDID)"
              break
            fi
          done

          if [ -z "$UDID" ]; then
            echo "ERROR: No suitable iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi

          xcrun simctl boot "$UDID" 2>/dev/null || true

          # Timeout-protected bootstatus (prevents infinite hang)
          xcrun simctl bootstatus "$UDID" -b 2>/dev/null &
          BPID=$!
          ( sleep 60; kill $BPID 2>/dev/null ) &
          TPID=$!
          wait $BPID 2>/dev/null || true
          kill $TPID 2>/dev/null || true
          sleep 5  # extra settle time

          xcrun simctl install "$UDID" "$APP"
          xcrun simctl privacy "$UDID" grant camera com.pixelherbarium.app
          xcrun simctl privacy "$UDID" grant location com.pixelherbarium.app
          xcrun simctl privacy "$UDID" grant photos com.pixelherbarium.app

          # Override status bar: 9:41, full battery, full signal (App Store standard)
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" \
            --batteryState charged --batteryLevel 100 \
            --wifiBars 3 --cellularMode active --cellularBars 4 \
            2>/dev/null || echo "WARN: status_bar override not available"

          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Capture App Store screenshots (signal-driven)
        timeout-minutes: 5
        run: |
          set -e
          rm -f e2e/current/*.png 2>/dev/null || true
          mkdir -p e2e/current
          BUNDLE_ID=com.pixelherbarium.app

          # Launch app
          xcrun simctl launch "$SIM_UDID" "$BUNDLE_ID"
          echo "App launched — waiting for signal-driven sequence..."

          # App creates its container on first launch; wait briefly
          sleep 3

          DATA_DIR=$(xcrun simctl get_app_container "$SIM_UDID" "$BUNDLE_ID" data 2>/dev/null || true)
          if [ -z "$DATA_DIR" ]; then
            echo "ERROR: could not get app data container"
            exit 1
          fi
          SIGNAL_DIR="${DATA_DIR}/Documents"
          echo "Signal dir: $SIGNAL_DIR"

          # Handshake: poll for signal → capture → delete (ack)
          capture_signal() {
            local SIGNAL="$1"
            local OUTPUT="$2"
            local TIMEOUT="${3:-60}"
            local ELAPSED=0
            echo "Waiting for $SIGNAL ..."
            while [ $ELAPSED -lt $TIMEOUT ]; do
              if [ -f "${SIGNAL_DIR}/${SIGNAL}" ]; then
                sleep 0.5
                xcrun simctl io "$SIM_UDID" screenshot "$OUTPUT" 2>/dev/null || true
                rm -f "${SIGNAL_DIR}/${SIGNAL}"
                echo "✓ $(basename "$OUTPUT") (${ELAPSED}s)"
                return 0
              fi
              sleep 1
              ELAPSED=$((ELAPSED + 1))
            done
            echo "::error::Timeout (${TIMEOUT}s) waiting for $SIGNAL"
            screencapture -x "$OUTPUT" 2>/dev/null || true
            return 1
          }

          FAIL=0
          # 4-screen sequence matching app's useScreenshotSequence.ts
          capture_signal "screenshot_ready_home"      "e2e/current/01-home.png"      60 || FAIL=1
          capture_signal "screenshot_ready_checkin"    "e2e/current/02-checkin.png"   30 || FAIL=1
          capture_signal "screenshot_ready_footprint"  "e2e/current/03-footprint.png" 30 || FAIL=1
          capture_signal "screenshot_ready_settings"   "e2e/current/04-settings.png"  30 || FAIL=1

          ls -la e2e/current/*.png 2>/dev/null
          [ $FAIL -eq 0 ] || exit 1

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-${{ github.sha }}
          path: e2e/current/*.png
          retention-days: 7
