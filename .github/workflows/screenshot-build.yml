name: Screenshot Build (simulator-screenshot)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Simulator App for Screenshots
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Screenshot-mode env vars (from eas.json simulator-screenshot profile)
      EXPO_PUBLIC_SUPABASE_URL: "https://uwdgnueaycatmkzkbxwo.supabase.co"
      EXPO_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3ZGdudWVheWNhdG1remtieHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTEwMTIsImV4cCI6MjA4OTA2NzAxMn0.ShB7IWQCZ1L3OQi53PqbVVNIJmvUSml0t7Dy15g_clg"
      EXPO_PUBLIC_SCREENSHOT_MODE: "true"
      APP_VARIANT: "development"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (required for Expo SDK 55)
        run: |
          echo "Available Xcode installations:"
          ls /Applications/ | grep -i xcode || true
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          TARGET="${XCODE26:-$LATEST}"
          echo "Selecting: $TARGET"
          sudo xcode-select -s "$TARGET/Contents/Developer"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      - name: Patch node_modules for Xcode 26 compatibility
        run: |
          # 1. Downgrade Swift version: 6.0 -> 5.9 in podspec
          sed -i '' "s/s\.swift_version  = '6\.0'/s.swift_version  = '5.9'/" \
            node_modules/expo-modules-core/ExpoModulesCore.podspec

          # 2. Remove @MainActor from conformance lists (Swift 6 syntax, not valid in 5.9)
          HOSTING="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          VIRTUAL="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift"
          VIEWDEF="node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift"
          sed -i '' 's/, @MainActor AnyExpoSwiftUIHostingView/, AnyExpoSwiftUIHostingView/' "$HOSTING"
          sed -i '' 's/: @MainActor ExpoSwiftUI\.ViewWrapper/: ExpoSwiftUI.ViewWrapper/' "$VIRTUAL"
          sed -i '' 's/extension UIView: @MainActor AnyArgument {/extension UIView: AnyArgument {/' "$VIEWDEF"

          echo "=== Verification ==="
          grep "swift_version" node_modules/expo-modules-core/ExpoModulesCore.podspec

      - name: Enable screenshot mode in .env.local
        run: |
          # Metro reads EXPO_PUBLIC_* from .env files, not from the process env directly.
          # Ensure .env.local has the screenshot mode flag active (uncommented).
          sed -i '' 's/^# EXPO_PUBLIC_SCREENSHOT_MODE=true/EXPO_PUBLIC_SCREENSHOT_MODE=true/' .env.local
          grep SCREENSHOT_MODE .env.local

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      - name: Patch folly headers (disable coroutines for Xcode 26+)
        run: |
          # ReactNativeDependencies bundles folly as a pre-built XCFramework.
          # Clang module caching ignores consumer compiler flags (-DFOLLY_CFG_NO_COROUTINES=1),
          # so we must patch the header files directly after pod install.
          # Step 1: Replace symlinks with real files (sed -i fails on symlinks)
          find ios/Pods -name '*.h' -path '*/folly/*' -type l 2>/dev/null | while read f; do
            cp -L "$f" "$f.tmp" && mv "$f.tmp" "$f"
          done
          # Step 2: Patch FOLLY_HAS_COROUTINES checks
          PATCHED=0
          for f in $(find ios/Pods -name '*.h' -path '*/folly/*' -type f 2>/dev/null); do
            if grep -q '#if FOLLY_HAS_COROUTINES' "$f" 2>/dev/null; then
              sed -i '' 's/#if FOLLY_HAS_COROUTINES/#if 0 \/* FOLLY_HAS_COROUTINES disabled *\//' "$f"
              echo "Patched: $f"
              PATCHED=$((PATCHED + 1))
            fi
          done
          echo "Total files patched: $PATCHED"

      - name: Build simulator app
        run: |
          set -eo pipefail
          cd ios
          xcodebuild \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcodebuild.log | tail -80
          echo "=== Build succeeded ==="

      - name: Package simulator app
        run: |
          set -e
          APP=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found in ios/build"
            find ios/build -type d -maxdepth 4 || true
            exit 1
          fi
          echo "Found: $APP"
          tar czf screenshot-sim.tar.gz -C "$(dirname "$APP")" "$(basename "$APP")"
          ls -lh screenshot-sim.tar.gz

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-sim-${{ github.sha }}
          path: screenshot-sim.tar.gz
          retention-days: 3

      - name: Boot Simulator & install app
        run: |
          set -e
          APP=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found in ios/build"
            exit 1
          fi
          echo "App: $APP"

          # Select best available iPhone simulator (priority: largest → smallest)
          DEVICE=""
          DEVICE_WIDTH=390
          for MODEL in "iPhone 17 Pro Max" "iPhone 17 Pro" "iPhone 17" "iPhone Air" "iPhone 16e" "iPhone 16 Pro Max" "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro Max"; do
            CANDIDATE=$(xcrun simctl list devices available 2>/dev/null \
              | grep "$MODEL" \
              | grep -v "unavailable" \
              | head -1 \
              | sed 's/ *(.*//' \
              | xargs)
            if [ -n "$CANDIDATE" ]; then
              DEVICE="$CANDIDATE"
              echo "Selected: $DEVICE ($MODEL)"
              case "$MODEL" in
                "iPhone 17 Pro Max"|"iPhone 16 Pro Max") DEVICE_WIDTH=440 ;;
                "iPhone 17 Pro") DEVICE_WIDTH=402 ;;
                "iPhone 17"|"iPhone Air") DEVICE_WIDTH=393 ;;
                "iPhone 16 Pro") DEVICE_WIDTH=402 ;;
                "iPhone 16 Pro Max") DEVICE_WIDTH=440 ;;
                *) DEVICE_WIDTH=390 ;;
              esac
              break
            fi
          done

          if [ -z "$DEVICE" ]; then
            echo "ERROR: No suitable iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi

          xcrun simctl boot "$DEVICE" || true
          # Wait for boot (falls back to sleep if -b flag unavailable)
          xcrun simctl bootstatus "$DEVICE" -b 2>/dev/null || sleep 20

          xcrun simctl install booted "$APP"
          xcrun simctl privacy booted grant camera com.pixelherbarium.app
          xcrun simctl privacy booted grant location com.pixelherbarium.app
          xcrun simctl privacy booted grant photos com.pixelherbarium.app

          echo "DEVICE_WIDTH=$DEVICE_WIDTH" >> $GITHUB_ENV

      - name: Capture App Store screenshots
        run: |
          mkdir -p e2e/current

          # Launch app and wait for full initialization (demo data + animation)
          xcrun simctl launch booted com.pixelherbarium.app
          echo "Waiting 20s for app to load..."
          sleep 20

          # Screenshot 1: Home tab (season header + diary grid)
          xcrun simctl io booted screenshot e2e/current/01-home.png
          echo "✓ 01-home"

          # Compute tab bar tap coordinates from screen width
          # Layout: 3 tabs at 1/6, 1/2, 5/6 of width; bar at ~98% screen height
          W=$DEVICE_WIDTH
          TAB_HOME=$(( W * 73 / 440 ))
          TAB_CHECKIN=$(( W / 2 ))
          TAB_SETTINGS=$(( W * 367 / 440 ))
          case "$W" in
            440) TAB_Y=935 ;;
            402) TAB_Y=853 ;;
            393) TAB_Y=827 ;;
            430) TAB_Y=908 ;;
            *) TAB_Y=820 ;;
          esac
          echo "Width=${W}pt  Home=${TAB_HOME},${TAB_Y}  Checkin=${TAB_CHECKIN},${TAB_Y}  Settings=${TAB_SETTINGS},${TAB_Y}"

          # Screenshot 2: Checkin tab (photo step with seasonal CTA)
          xcrun simctl ui booted tap $TAB_CHECKIN $TAB_Y 2>/dev/null || echo "WARN: tap checkin failed"
          sleep 4
          xcrun simctl io booted screenshot e2e/current/02-checkin.png
          echo "✓ 02-checkin"

          # Screenshot 3: Settings tab
          xcrun simctl ui booted tap $TAB_SETTINGS $TAB_Y 2>/dev/null || echo "WARN: tap settings failed"
          sleep 3
          xcrun simctl io booted screenshot e2e/current/03-settings.png
          echo "✓ 03-settings"

          # Screenshot 4: Home tab → tap diary card for detail view
          xcrun simctl ui booted tap $TAB_HOME $TAB_Y 2>/dev/null || echo "WARN: tap home failed"
          sleep 2
          CARD_X=$(( W / 2 ))
          xcrun simctl ui booted tap $CARD_X 500 2>/dev/null || echo "WARN: card tap failed"
          sleep 3
          xcrun simctl io booted screenshot e2e/current/04-detail.png
          echo "✓ 04-detail"

          ls -la e2e/current/*.png 2>/dev/null
          echo "Total: $(ls e2e/current/*.png 2>/dev/null | wc -l | tr -d ' ') screenshots"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-${{ github.sha }}
          path: e2e/current/*.png
          retention-days: 7
