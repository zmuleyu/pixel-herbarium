name: Screenshot Build (preview-screenshot)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build IPA for Screenshots
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (required for Expo SDK 55)
        run: |
          echo "Available Xcode installations:"
          ls /Applications/ | grep -i xcode || true
          # Prefer Xcode 26.x (Apple year versioning, released fall 2025)
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          TARGET="${XCODE26:-$LATEST}"
          echo "Selecting: $TARGET"
          sudo xcode-select -s "$TARGET/Contents/Developer"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      - name: Build preview-screenshot IPA locally
        run: |
          set -e
          npx eas build --local \
            --profile preview-screenshot \
            --platform ios \
            --non-interactive \
            --output screenshot.ipa
          ls -lh screenshot.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-ipa-${{ github.sha }}
          path: screenshot.ipa
          retention-days: 3
