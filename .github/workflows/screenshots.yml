name: App Store Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    name: Build & Capture Screenshots
    runs-on: macos-15
    timeout-minutes: 60
    env:
      BUNDLE_ID: com.pixelherbarium.app
      EXPO_PUBLIC_SUPABASE_URL: https://uwdgnueaycatmkzkbxwo.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      SCREENSHOT_MODE: "true"

    steps:
      # ── Setup ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - run: npm ci

      # ── Select Xcode ───────────────────────────────────────────────
      - name: Select Xcode 26
        run: |
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          TARGET="${XCODE26:-$LATEST}"
          echo "Selecting: $TARGET"
          sudo xcode-select -s "$TARGET/Contents/Developer"
          xcodebuild -version

      # ── Native build ───────────────────────────────────────────────
      - name: Prepare native iOS project
        run: bash scripts/ios-build-setup.sh development

      - name: Build simulator app
        run: |
          set -eo pipefail
          cd ios
          xcodebuild \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -20
          echo "=== Build succeeded ==="

      # ── Simulator setup ────────────────────────────────────────────
      - name: Boot simulator & install app
        run: |
          set -e
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in ios/build"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

          # Select best available device
          DEVICE=""
          for MODEL in "iPhone 17 Pro Max" "iPhone 17 Pro" "iPhone 16 Pro Max" "iPhone 16 Pro" "iPhone 15 Pro Max"; do
            UDID=$(xcrun simctl list devices available \
              | grep "$MODEL" | head -1 \
              | grep -oE '[A-F0-9-]{36}')
            if [ -n "$UDID" ]; then
              DEVICE="$MODEL"
              echo "Selected: $DEVICE ($UDID)"
              echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
              break
            fi
          done
          if [ -z "$DEVICE" ]; then
            echo "::error::No suitable simulator device found"
            xcrun simctl list devices available
            exit 1
          fi

          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b 2>/dev/null || sleep 20

          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl privacy "$UDID" grant camera "$BUNDLE_ID"
          xcrun simctl privacy "$UDID" grant location "$BUNDLE_ID"
          xcrun simctl privacy "$UDID" grant photos "$BUNDLE_ID"

          # Override status bar: 9:41, full battery, full signal (App Store standard)
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --wifiBars 3 \
            --cellularMode active \
            --cellularBars 4 \
            2>/dev/null || echo "WARN: status_bar override not supported on this OS"

      # ── Signal-driven screenshot capture ───────────────────────────
      - name: Capture screenshots (signal-driven)
        run: |
          set -e
          mkdir -p e2e/current

          # Get app data container path (where signal files are written)
          DATA_DIR=$(xcrun simctl get_app_container "$SIM_UDID" "$BUNDLE_ID" data 2>/dev/null || true)
          # Fallback: install fresh, then get container
          if [ -z "$DATA_DIR" ]; then
            xcrun simctl uninstall "$SIM_UDID" "$BUNDLE_ID" 2>/dev/null || true
            xcrun simctl install "$SIM_UDID" "$APP_PATH"
            xcrun simctl privacy "$SIM_UDID" grant camera "$BUNDLE_ID"
            xcrun simctl privacy "$SIM_UDID" grant location "$BUNDLE_ID"
            xcrun simctl privacy "$SIM_UDID" grant photos "$BUNDLE_ID"
          fi

          # Launch app
          xcrun simctl launch "$SIM_UDID" "$BUNDLE_ID"
          echo "App launched — waiting for signal-driven screenshot sequence..."

          # Wait a moment for app to create its Documents directory
          sleep 3

          # Re-read data dir after app launch (container created on first launch)
          DATA_DIR=$(xcrun simctl get_app_container "$SIM_UDID" "$BUNDLE_ID" data)
          SIGNAL_DIR="${DATA_DIR}/Documents"
          echo "Signal directory: $SIGNAL_DIR"

          # Handshake function: poll for signal → capture → delete signal (ack)
          capture_screenshot() {
            local SIGNAL_NAME="$1"
            local OUTPUT="$2"
            local TIMEOUT="${3:-60}"
            local ELAPSED=0
            echo "Waiting for signal: $SIGNAL_NAME ..."

            while [ $ELAPSED -lt $TIMEOUT ]; do
              if [ -f "${SIGNAL_DIR}/${SIGNAL_NAME}" ]; then
                # Small delay to ensure render is fully committed
                sleep 0.5
                xcrun simctl io "$SIM_UDID" screenshot "$OUTPUT"
                rm -f "${SIGNAL_DIR}/${SIGNAL_NAME}"
                echo "✓ $(basename "$OUTPUT") captured (${ELAPSED}s)"
                return 0
              fi
              sleep 1
              ELAPSED=$((ELAPSED + 1))
            done
            echo "::error::Timeout (${TIMEOUT}s) waiting for $SIGNAL_NAME"
            # Take screenshot anyway for debugging
            xcrun simctl io "$SIM_UDID" screenshot "$OUTPUT" 2>/dev/null || true
            return 1
          }

          FAIL=0

          # 01 — Home (with emoji placeholder cards)
          capture_screenshot "screenshot_ready_home" "e2e/current/01-home.png" 60 || FAIL=1

          # 02 — Checkin photo step
          capture_screenshot "screenshot_ready_checkin" "e2e/current/02-checkin.png" 30 || FAIL=1

          # 03 — Footprint history grid
          capture_screenshot "screenshot_ready_footprint" "e2e/current/03-footprint.png" 30 || FAIL=1

          # 04 — Settings
          capture_screenshot "screenshot_ready_settings" "e2e/current/04-settings.png" 30 || FAIL=1

          [ $FAIL -eq 0 ] || exit 1

      # ── Validation ─────────────────────────────────────────────────
      - name: Validate screenshot dimensions
        run: |
          FAIL=0
          for f in e2e/current/*.png; do
            W=$(sips -g pixelWidth  "$f" | awk '/pixelWidth/{print $2}')
            H=$(sips -g pixelHeight "$f" | awk '/pixelHeight/{print $2}')
            echo "  $f: ${W}x${H}px"
            # iPhone 17 PM: 1320x2868 | iPhone 16 PM: 1290x2796 | iPhone 15 PM: 1284x2778
            if [ "$W" -lt 1280 ] 2>/dev/null || [ "$H" -lt 2770 ] 2>/dev/null; then
              echo "::error::$f — dimensions ${W}x${H} too small for App Store 6.7\""
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ]

      - name: Verify screenshot uniqueness
        run: |
          HASHES=""
          for f in e2e/current/*.png; do
            H=$(md5 -q "$f")
            echo "  $(basename "$f"): $H"
            HASHES="$HASHES $H"
          done
          UNIQUE=$(echo "$HASHES" | tr ' ' '\n' | sort -u | wc -l | tr -d ' ')
          TOTAL=$(ls e2e/current/*.png | wc -l | tr -d ' ')
          echo "Unique: $UNIQUE / $TOTAL"
          if [ "$UNIQUE" != "$TOTAL" ]; then
            echo "::error::Duplicate screenshots detected — timing or navigation issue"
            exit 1
          fi
          echo "✓ All screenshots are unique"

      # ── Upload ─────────────────────────────────────────────────────
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appstore-screenshots-${{ github.run_number }}
          path: e2e/current/*.png
          retention-days: 30
