appId: com.pixelherbarium.app
---
# Navigate to a collected plant detail and verify flip card is present
- runFlow: ./04-herbarium-grid.yaml
- tapOn:
    id: "herbarium.grid"
    index: 0
- assertVisible:
    id: "dot-0"
    timeout: 5000
- tapOn:
    id: "dot-0"
- assertVisible:
    id: "dot-1"
    timeout: 3000
