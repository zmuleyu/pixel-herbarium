appId: com.pixelherbarium.app
---
# Navigate to Settings tab and verify language selector is visible (CHECKIN_MODE: replaces profile tab)
- runFlow: ./02-login-email.yaml
- extendedWaitUntil:
    visible:
      id: "tab.settings"
    timeout: 10000
- tapOn:
    id: "tab.settings"
- assertVisible:
    id: "settings.container"
