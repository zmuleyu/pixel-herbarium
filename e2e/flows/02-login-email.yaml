appId: com.pixelherbarium.app
---
# Email login flow — fully self-contained: clearState → skip onboarding → login
# Used as a reusable sub-flow by flows 03–06 via runFlow
- launchApp:
    clearState: true
# Dismiss permission dialogs if they appear (camera / location)
- runFlow:
    when:
      visible: "Would like to access"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible: "Would like to access"
    commands:
      - tapOn: "Allow"
# Wait for bootstrap to complete (supabase.auth.getSession can take up to 8s)
- extendedWaitUntil:
    visible:
      id: "onboarding.skip"
    timeout: 15000
# Skip onboarding → app navigates to /(auth)/login directly
- tapOn:
    id: "onboarding.skip"
# Wait for login screen to render after route transition (can take 5-10s on CI)
- extendedWaitUntil:
    visible:
      id: "auth.email"
    timeout: 20000
- tapOn:
    id: "auth.email"
- inputText: "${E2E_TEST_EMAIL}"
- tapOn:
    id: "auth.password"
- inputText: "${E2E_TEST_PASSWORD}"
- tapOn:
    id: "auth.signIn"
# Supabase auth + redirect can take 10-20s on CI — use extended wait
- extendedWaitUntil:
    visible:
      id: "home.container"
    timeout: 30000
