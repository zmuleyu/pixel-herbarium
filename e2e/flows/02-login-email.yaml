appId: com.pixelherbarium.app
---
# Email login flow — fully self-contained: clearState → skip onboarding → login
# Used as a reusable sub-flow by flows 03–07 via runFlow
- launchApp:
    clearState: true
# Dismiss permission dialogs if they appear (camera / location)
- runFlow:
    when:
      visible: "Would like to access"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible: "Would like to access"
    commands:
      - tapOn: "Allow"
# Wait for bootstrap to complete (supabase.auth.getSession can take up to 8s)
- extendedWaitUntil:
    visible:
      id: "onboarding.skip"
    timeout: 15000
# Skip onboarding → guest-first app navigates to /(tabs)/home
- tapOn:
    id: "onboarding.skip"
# Wait for home screen after onboarding skip
- extendedWaitUntil:
    visible:
      id: "home.container"
    timeout: 20000
# Navigate to Settings tab → Login (use testID to avoid CJK encoding issues on CI)
# Wait for tab bar to fully render after navigation
- extendedWaitUntil:
    visible:
      id: "tab.settings"
    timeout: 10000
- tapOn:
    id: "tab.settings"
- extendedWaitUntil:
    visible:
      id: "settings.login"
    timeout: 10000
- tapOn:
    id: "settings.login"
# Wait for login screen to render
- extendedWaitUntil:
    visible:
      id: "auth.email"
    timeout: 15000
- tapOn:
    id: "auth.email"
- inputText: "${E2E_TEST_EMAIL}"
- tapOn:
    id: "auth.password"
- inputText: "${E2E_TEST_PASSWORD}"
- tapOn:
    id: "auth.signIn"
# Supabase auth + redirect can take 10-20s on CI — use extended wait
- extendedWaitUntil:
    visible:
      id: "home.container"
    timeout: 30000
