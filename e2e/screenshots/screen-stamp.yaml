appId: com.pixelherbarium.app
---
# Screenshot: Settings tab — show app settings and login option
# Stamp flow requires login + full checkin which is fragile on CI.
# Instead, capture settings screen as a useful ASC screenshot.
- runFlow: ./screen-guest-skip.yaml
# Navigate to settings tab (4th of 4 tabs, ~87% from left)
- tapOn:
    point:
      x: 87
      y: 96
- pause:
    milliseconds: 1500
- waitForAnimationToEnd
- takeScreenshot: "06-settings"
