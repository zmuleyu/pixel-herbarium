appId: com.pixelherbarium.app
---
# Reusable sub-flow: launch fresh → skip onboarding → email login → arrive at home
# Uses email login (compatible with all binary versions)
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Would like to access"
    commands:
      - tapOn: "Allow"
- extendedWaitUntil:
    visible:
      id: "onboarding.skip"
    timeout: 15000
- tapOn:
    id: "onboarding.skip"
- extendedWaitUntil:
    visible:
      id: "auth.email"
    timeout: 20000
- tapOn:
    id: "auth.email"
- inputText: ${E2E_TEST_EMAIL}
- tapOn:
    id: "auth.password"
- inputText: ${E2E_TEST_PASSWORD}
- tapOn:
    id: "auth.signIn"
- extendedWaitUntil:
    visible:
      id: "home.container"
    timeout: 30000
- waitForAnimationToEnd
