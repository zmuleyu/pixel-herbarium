appId: com.pixelherbarium.app
---
# Screenshot: Footprint tab — check-in history grid
- runFlow: ./screen-guest-login.yaml
# Navigate to footprint tab via coordinate (3rd of 4 tabs, ~62% from left, ~96% from top)
- tapOn:
    point:
      x: 62
      y: 96
- extendedWaitUntil:
    visible:
      id: "footprint.container"
    timeout: 10000
- waitForAnimationToEnd
- takeScreenshot: "05-footprint"
