appId: com.pixelherbarium.app
---
# Screenshot: Login screen — shown after skipping onboarding
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "onboarding.skip"
    timeout: 15000
- tapOn:
    id: "onboarding.skip"
- extendedWaitUntil:
    visible:
      id: "auth.apple"
    timeout: 20000
- waitForAnimationToEnd
- takeScreenshot: "04-login"
