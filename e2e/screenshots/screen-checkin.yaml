appId: com.pixelherbarium.app
---
# Screenshot: Check-in tab — spot selection / photo entry screen
- runFlow: ./screen-guest-login.yaml
# Navigate to checkin tab via coordinate (2nd of 4 tabs, ~37% from left, ~96% from top)
# Avoids CJK text matching which fails on Codemagic macOS
- tapOn:
    point:
      x: 37
      y: 96
- waitForAnimationToEnd
- pause:
    milliseconds: 1500
- takeScreenshot: "03-checkin"
