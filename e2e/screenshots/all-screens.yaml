appId: com.pixelherbarium.app
---
# All-in-one screenshot flow: single Maestro session, all tabs, absolute paths.
#
# Key fixes (from 10-build iteration):
# - clearState: false → preserves SCREENSHOT_MODE demo data (満開 + records)
# - stopApp: false → doesn't kill running process
# - takeScreenshot: /tmp/screenshots/xx → absolute path, no find needed
# - coordinate taps for tab nav → avoids testID (broken on iOS 26) and deep links (dialog)

- launchApp:
    clearState: false
    stopApp: false

- waitForAnimationToEnd:
    timeout: 3000

# Dismiss permission dialogs if they appear
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# Handle onboarding: skip if visible, otherwise already on home
- runFlow:
    when:
      visible:
        id: "onboarding.skip"
    commands:
      - tapOn:
          id: "onboarding.skip"
      - extendedWaitUntil:
          visible:
            id: "home.container"
          timeout: 20000
      - waitForAnimationToEnd
      - pause:
          milliseconds: 1500

# Ensure home is loaded (if onboarding was already skipped)
- pause:
    milliseconds: 2000

# Screenshot 1: Home (満開 + checkin records)
- takeScreenshot: /tmp/screenshots/01-home

# Navigate to Checkin tab (2nd of 4 tabs, ~37% from left, ~96% from top)
- tapOn:
    point: "37%,96%"
- pause:
    milliseconds: 2000
- waitForAnimationToEnd

# Screenshot 2: Checkin
- takeScreenshot: /tmp/screenshots/02-checkin

# Navigate to Footprint tab (3rd of 4 tabs, ~62% from left)
- tapOn:
    point: "62%,96%"
- pause:
    milliseconds: 2000
- waitForAnimationToEnd

# Screenshot 3: Footprint
- takeScreenshot: /tmp/screenshots/03-footprint

# Navigate to Settings tab (4th of 4 tabs, ~87% from left)
- tapOn:
    point: "87%,96%"
- pause:
    milliseconds: 2000
- waitForAnimationToEnd

# Screenshot 4: Settings
- takeScreenshot: /tmp/screenshots/04-settings
