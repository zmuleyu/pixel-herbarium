workflows:
  ios-ci:
    name: iOS CI (Jest + E2E + Visual Regression)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 20.18.0
      groups:
        - expo_credentials
    triggering:
      events: [push]
      branch_patterns:
        - pattern: master
        - pattern: dev
    scripts:
      - name: Install deps
        script: npm ci

      - name: Jest unit + screen tests
        script: npx jest --ci --passWithNoTests --forceExit

      - name: TypeScript check
        script: npx tsc --noEmit

      - name: Build iOS Simulator app locally
        script: |
          npm install -g eas-cli
          # Build locally on this Mac — avoids EAS cloud quota limits and always
          # uses the current commit's code (no stale binary from EAS cache).
          # xcode: latest required — 16.1/16.2 have Swift strict concurrency errors
          # with RN 0.83 Expo modules. Boot step below forces iOS 18 simulator.
          eas build --local --profile simulator-screenshot --platform ios --non-interactive \
            --output app.tar.gz
          # Verify the build artifact exists before proceeding
          if [ ! -f app.tar.gz ]; then
            echo "ERROR: app.tar.gz not found — eas build --local failed"
            exit 1
          fi
          tar xzf app.tar.gz || unzip -q app.tar.gz || true
          # Verify .app was extracted
          APP_CHECK=$(find . -name "*.app" -maxdepth 4 | head -1)
          if [ -z "$APP_CHECK" ]; then
            echo "ERROR: No .app found after extraction"
            ls -la
            exit 1
          fi
          echo "Build artifact verified: $APP_CHECK"

      - name: Boot Simulator & install app
        script: |
          # xcode: latest only ships iOS 26 beta runtime (no iOS 18).
          # App runs on iOS 26 (verified in earlier builds), so we use the largest
          # available device for ASC-quality screenshots.
          # Priority: iPhone 17 Pro Max > iPhone 17 Pro > iPhone Air > iPhone 16e
          DEVICE=""
          for MODEL in "iPhone 17 Pro Max" "iPhone 17 Pro" "iPhone Air" "iPhone 17" "iPhone 16e"; do
            DEVICE=$(xcrun simctl list devices available 2>/dev/null \
              | grep "$MODEL" \
              | grep -v "unavailable" \
              | head -1 \
              | sed 's/ *(.*//' \
              | xargs)
            if [ -n "$DEVICE" ]; then
              echo "Selected: $DEVICE"
              break
            fi
          done
          if [ -z "$DEVICE" ]; then
            echo "ERROR: No suitable iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "$DEVICE" || true
          # Install app
          APP_PATH=$(find . -name "*.app" -maxdepth 4 | head -1)
          echo "App path: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found to install"
            exit 1
          fi
          xcrun simctl install booted "$APP_PATH"
          # Pre-grant permissions to prevent system dialogs blocking E2E flows
          xcrun simctl privacy booted grant camera com.pixelherbarium.app
          xcrun simctl privacy booted grant location com.pixelherbarium.app
          xcrun simctl privacy booted grant photos com.pixelherbarium.app

      - name: Debug - capture app state screenshot
        script: |
          # Launch the app, wait for it to settle, then screenshot
          xcrun simctl launch booted com.pixelherbarium.app
          sleep 15
          mkdir -p e2e/current
          xcrun simctl io booted screenshot e2e/current/debug-app-state.png
          echo "Screenshot saved to e2e/current/debug-app-state.png"
          # Also dump the accessibility tree for debugging
          xcrun simctl spawn booted log show --last 30s --predicate 'process == "PixelHerbarium"' > e2e/current/debug-app-log.txt 2>&1 || true

      - name: Run Maestro E2E flows
        script: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test e2e/flows/ \
            --format junit \
            --output e2e-results.xml \
            --env E2E_TEST_EMAIL=$E2E_TEST_EMAIL \
            --env E2E_TEST_PASSWORD=$E2E_TEST_PASSWORD || true
          # Post-failure diagnostic: capture what screen the app is currently on
          mkdir -p e2e/current
          xcrun simctl io booted screenshot e2e/current/post-maestro-state.png 2>/dev/null || true
          # Check if e2e-results.xml has any failures
          if grep -q 'failures="0"' e2e-results.xml 2>/dev/null; then
            echo "All E2E tests passed"
          else
            echo "E2E tests had failures — continuing to screenshot flows"
          fi

      - name: Capture App Store screenshots via idb
        script: |
          mkdir -p e2e/current

          # 11 builds proved Maestro cannot reliably navigate tabs on iOS 26:
          # - takeScreenshot paths unpredictable (Builds #36-40)
          # - session isolation restarts app (Builds #38,42)
          # - clearState:false + absolute paths still no output (Build #43)
          #
          # Switch to Facebook idb (iOS Development Bridge):
          # - Direct tap + screenshot commands via persistent connection
          # - No YAML flows, no session management, no path guessing
          # - Designed for headless CI automation

          # Install idb (Facebook iOS Development Bridge)
          echo "=== Installing idb ==="
          brew tap facebook/fb 2>&1 || echo "WARN: brew tap failed"
          brew install idb-companion 2>&1 || echo "WARN: brew install idb-companion failed"
          pip3 install fb-idb 2>&1 || echo "WARN: pip3 install fb-idb failed"

          # Verify installation
          echo "=== idb version check ==="
          which idb && idb --help 2>&1 | head -5 || echo "ERROR: idb not found in PATH"
          idb_companion --version 2>&1 || echo "ERROR: idb_companion not found"

          # Get booted simulator UDID
          UDID=$(xcrun simctl list devices booted | grep "Booted" | head -1 | grep -oE '[A-F0-9-]{36}')
          echo "Simulator UDID: $UDID"

          if [ -z "$UDID" ]; then
            echo "ERROR: No booted simulator found"
            xcrun simctl io booted screenshot e2e/current/01-home.png 2>/dev/null || true
            exit 0
          fi

          # Connect idb to simulator
          echo "=== Connecting idb ==="
          idb connect "$UDID" 2>&1 || echo "WARN: idb connect failed"

          # Verify connection
          idb list-targets 2>&1 || echo "WARN: idb list-targets failed"

          # App should already be running from debug step (on home screen).
          # Tab bar: 4 tabs (ホーム/打卡/足跡/設定) at bottom.
          #
          # COORDINATE SYSTEM: idb uses POINT coordinates (not pixels!)
          # iPhone 17 Pro Max: 440×956 points (@3x = 1320×2868 pixels)
          # Tab bar: y ≈ 935pt (bottom), 4 tabs evenly at x = 55/165/275/385 pt
          #
          # Tab 1 (ホーム):  x=55,  y=935
          # Tab 2 (打卡):    x=165, y=935
          # Tab 3 (足跡):    x=275, y=935
          # Tab 4 (設定):    x=385, y=935

          # Screenshot 1: Home (already visible, 満開 + records)
          idb screenshot e2e/current/01-home.png 2>&1 || \
            xcrun simctl io booted screenshot e2e/current/01-home.png
          echo "✓ 01-home"

          # Tap checkin tab (point coordinates) and screenshot
          echo "Tapping checkin tab at 165,935..."
          idb ui tap 165 935 2>&1 || echo "WARN: idb tap failed"
          sleep 3
          idb screenshot e2e/current/02-checkin.png 2>&1 || \
            xcrun simctl io booted screenshot e2e/current/02-checkin.png
          echo "✓ 02-checkin"

          # Tap footprint tab and screenshot
          echo "Tapping footprint tab at 275,935..."
          idb ui tap 275 935 2>&1 || echo "WARN: idb tap failed"
          sleep 3
          idb screenshot e2e/current/03-footprint.png 2>&1 || \
            xcrun simctl io booted screenshot e2e/current/03-footprint.png
          echo "✓ 03-footprint"

          # Tap settings tab and screenshot
          echo "Tapping settings tab at 385,935..."
          idb ui tap 385 935 2>&1 || echo "WARN: idb tap failed"
          sleep 3
          idb screenshot e2e/current/04-settings.png 2>&1 || \
            xcrun simctl io booted screenshot e2e/current/04-settings.png
          echo "✓ 04-settings"

          echo "=== Screenshot capture complete ==="
          ls -la e2e/current/*.png 2>/dev/null
          COUNT=$(ls e2e/current/0*.png 2>/dev/null | wc -l)
          echo "Total tab screenshots: $COUNT"

      - name: Visual regression check
        script: |
          if [ -d e2e/baselines ] && [ "$(ls -A e2e/baselines 2>/dev/null)" ]; then
            npm install --no-save pixelmatch pngjs
            node scripts/visual-regression.mjs
          else
            echo "No baselines yet — skipping regression check (first run establishes baselines)"
          fi

    artifacts:
      - e2e-results.xml
      - e2e/diffs/*.png
      - e2e/current/*.png
      - e2e/current/*.txt

  ios-production:
    name: Production Build + Submit
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 20.18.0
      groups:
        - expo_credentials
    triggering:
      events: []
    scripts:
      - name: Install deps
        script: npm ci

      - name: Build production IPA (EAS cloud)
        script: |
          set -e
          npm install -g eas-cli
          # EAS cloud build handles Distribution Certificate automatically.
          # --wait blocks until build completes (typically 20-40 min).
          # Credentials MUST be pre-configured via `eas credentials` (interactive).
          eas build --profile production --platform ios --non-interactive --wait
          echo "EAS cloud build complete"

      - name: Submit to App Store Connect
        script: |
          set -e
          # Submit the latest finished EAS build directly (no IPA download needed)
          eas submit --profile production --platform ios --latest --non-interactive
          echo "Submitted to ASC — check App Store Connect for build status"
