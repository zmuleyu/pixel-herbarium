workflows:
  ios-ci:
    name: iOS CI (Jest + E2E + Visual Regression)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 20.19.4
      groups:
        - expo_credentials
    triggering:
      events: [push]
      branch_patterns:
        - pattern: master
        - pattern: dev
    scripts:
      - name: Install deps
        script: npm ci

      - name: Jest unit + screen tests
        script: npx jest --ci --passWithNoTests --forceExit

      - name: TypeScript check
        script: npx tsc --noEmit

      - name: Patch native modules for Xcode 26 compatibility
        script: |
          # expo-modules-core: downgrade Swift 6.0 → 5.9, remove @MainActor conformance syntax
          sed -i '' "s/s\.swift_version  = '6\.0'/s.swift_version  = '5.9'/" \
            node_modules/expo-modules-core/ExpoModulesCore.podspec
          HOSTING="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          VIRTUAL="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift"
          VIEWDEF="node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift"
          sed -i '' 's/, @MainActor AnyExpoSwiftUIHostingView/, AnyExpoSwiftUIHostingView/' "$HOSTING"
          sed -i '' 's/: @MainActor ExpoSwiftUI\.ViewWrapper/: ExpoSwiftUI.ViewWrapper/' "$VIRTUAL"
          sed -i '' 's/extension UIView: @MainActor AnyArgument {/extension UIView: AnyArgument {/' "$VIEWDEF"
          echo "=== Patches applied ==="
          grep "swift_version" node_modules/expo-modules-core/ExpoModulesCore.podspec

      - name: Generate native iOS project
        script: |
          export EXPO_PUBLIC_SCREENSHOT_MODE=true
          export APP_VARIANT=development
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install && cd ..

      - name: Patch folly headers (disable coroutines for Xcode 26+)
        script: |
          # ReactNativeDependencies bundles folly as pre-built XCFramework with symlinked headers.
          # Step 1: Replace symlinks with real files (sed -i fails on symlinks)
          find ios/Pods -name '*.h' -path '*/folly/*' -type l 2>/dev/null | while read f; do
            cp -L "$f" "$f.tmp" && mv "$f.tmp" "$f"
          done
          # Step 2: Patch FOLLY_HAS_COROUTINES checks
          PATCHED=0
          for f in $(find ios/Pods -name '*.h' -path '*/folly/*' -type f 2>/dev/null); do
            if grep -q '#if FOLLY_HAS_COROUTINES' "$f" 2>/dev/null; then
              sed -i '' 's/#if FOLLY_HAS_COROUTINES/#if 0 \/* FOLLY_HAS_COROUTINES disabled *\//' "$f"
              echo "Patched: $f"
              PATCHED=$((PATCHED + 1))
            fi
          done
          echo "Total files patched: $PATCHED"

      - name: Build iOS Simulator app
        script: |
          set -eo pipefail
          cd ios
          xcodebuild \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcodebuild.log | tail -80
          echo "=== Build succeeded ==="

      - name: Package simulator app
        script: |
          set -e
          APP=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          echo "Build artifact verified: $APP"

      - name: Boot Simulator & install app
        script: |
          # xcode: latest only ships iOS 26 beta runtime (no iOS 18).
          # App runs on iOS 26 (verified in earlier builds), so we use the largest
          # available device for ASC-quality screenshots.
          # Priority: iPhone 17 Pro Max > iPhone 17 Pro > iPhone Air > iPhone 16e
          DEVICE=""
          for MODEL in "iPhone 17 Pro Max" "iPhone 17 Pro" "iPhone Air" "iPhone 17" "iPhone 16e"; do
            DEVICE=$(xcrun simctl list devices available 2>/dev/null \
              | grep "$MODEL" \
              | grep -v "unavailable" \
              | head -1 \
              | sed 's/ *(.*//' \
              | xargs)
            if [ -n "$DEVICE" ]; then
              echo "Selected: $DEVICE"
              break
            fi
          done
          if [ -z "$DEVICE" ]; then
            echo "ERROR: No suitable iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "$DEVICE" || true
          # Install app
          APP_PATH=$(find . -name "*.app" -maxdepth 4 | head -1)
          echo "App path: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found to install"
            exit 1
          fi
          xcrun simctl install booted "$APP_PATH"
          # Pre-grant permissions to prevent system dialogs blocking E2E flows
          xcrun simctl privacy booted grant camera com.pixelherbarium.app
          xcrun simctl privacy booted grant location com.pixelherbarium.app
          xcrun simctl privacy booted grant photos com.pixelherbarium.app

      - name: Debug - capture app state screenshot
        script: |
          # Launch the app, wait for it to settle, then screenshot
          xcrun simctl launch booted com.pixelherbarium.app
          sleep 15
          mkdir -p e2e/current
          xcrun simctl io booted screenshot e2e/current/debug-app-state.png
          echo "Screenshot saved to e2e/current/debug-app-state.png"
          # Also dump the accessibility tree for debugging
          xcrun simctl spawn booted log show --last 30s --predicate 'process == "PixelHerbarium"' > e2e/current/debug-app-log.txt 2>&1 || true

      - name: Run Maestro E2E flows
        script: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test e2e/flows/ \
            --format junit \
            --output e2e-results.xml \
            --env E2E_TEST_EMAIL=$E2E_TEST_EMAIL \
            --env E2E_TEST_PASSWORD=$E2E_TEST_PASSWORD || true
          # Post-failure diagnostic: capture what screen the app is currently on
          mkdir -p e2e/current
          xcrun simctl io booted screenshot e2e/current/post-maestro-state.png 2>/dev/null || true
          # Check if e2e-results.xml has any failures
          if grep -q 'failures="0"' e2e-results.xml 2>/dev/null; then
            echo "All E2E tests passed"
          else
            echo "E2E tests had failures — continuing to screenshot flows"
          fi

      - name: Capture App Store screenshots
        script: |
          mkdir -p e2e/current

          # App auto-navigates tabs via useScreenshotSequence hook:
          #   T+0s:  home (start)
          #   T+8s:  checkin
          #   T+13s: settings
          #   T+18s: back to home
          # CI just captures at known offsets — no external navigation needed.

          # App should already be running from debug step
          echo "App running — auto-navigation sequence active"

          # Screenshot 1: Home (already on home from debug step launch)
          sleep 5
          xcrun simctl io booted screenshot e2e/current/01-home.png
          echo "✓ 01-home"

          # Screenshot 2: Checkin (app navigated at T+8s from launch)
          sleep 10
          xcrun simctl io booted screenshot e2e/current/02-checkin.png
          echo "✓ 02-checkin"

          # Screenshot 3: Settings (app navigated at T+13s from launch)
          sleep 5
          xcrun simctl io booted screenshot e2e/current/03-settings.png
          echo "✓ 03-settings"

          # Screenshot 4: Home again (app navigated at T+18s), tap card for detail
          sleep 5
          xcrun simctl ui booted tap 180 500 2>/dev/null || echo "WARN: card tap failed"
          sleep 3
          xcrun simctl io booted screenshot e2e/current/04-detail.png
          echo "✓ 04-detail"

          echo "=== Screenshot capture complete ==="
          ls -la e2e/current/*.png 2>/dev/null
          COUNT=$(ls e2e/current/0*.png 2>/dev/null | wc -l)
          echo "Total tab screenshots: $COUNT"

      - name: Visual regression check
        script: |
          if [ -d e2e/baselines ] && [ "$(ls -A e2e/baselines 2>/dev/null)" ]; then
            npm install --no-save pixelmatch pngjs
            node scripts/visual-regression.mjs
          else
            echo "No baselines yet — skipping regression check (first run establishes baselines)"
          fi

    artifacts:
      - e2e-results.xml
      - e2e/diffs/*.png
      - e2e/current/*.png
      - e2e/current/*.txt

  # FALLBACK — Primary production pipeline is GitHub Actions (.github/workflows/release.yml)
  # Kept as manual backup. Trigger via Codemagic Dashboard or API.
  ios-production:
    name: Production Build + Submit (FALLBACK)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 20.19.4
      groups:
        - expo_credentials
    triggering:
      events: []
    scripts:
      - name: Install deps
        script: npm ci

      - name: Build production IPA (local on Codemagic Mac)
        script: |
          set -e
          npm install -g eas-cli
          # Build locally on Codemagic Mac M2 — bypasses EAS cloud quota limits.
          # Credentials are downloaded from EAS servers (configured via `eas credentials`).
          # App Store Distribution cert + provisioning profile R82P6892TZ set up 2026-03-20.
          eas build --local --profile production --platform ios --non-interactive \
            --output production.ipa
          ls -lh production.ipa
          echo "Local build complete: production.ipa"

      - name: Submit to App Store Connect
        script: |
          set -e
          # Submit the locally-built IPA to ASC via Transporter
          eas submit --platform ios --path production.ipa --non-interactive
          echo "Submitted to ASC — check App Store Connect for build status"
