<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f6f3"/>
      <stop offset="100%" stop-color="#ede9e3"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf8f5"/>
    </linearGradient>
    <linearGradient id="petalGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5d5d0"/>
      <stop offset="100%" stop-color="#e8a5b0"/>
    </linearGradient>
    <!-- Subtle paper texture -->
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise" seed="2"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComponentTransfer in="textured">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background with iOS rounded rect -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Journal / Book -->
  <g transform="translate(512, 440)">
    <!-- Book shadow -->
    <rect x="-268" y="-226" width="536" height="412" rx="28" fill="#d8d4ce" opacity="0.35" transform="translate(8, 10)"/>

    <!-- Book cover -->
    <rect x="-268" y="-226" width="536" height="412" rx="28" fill="url(#page)" stroke="#e0dcd6" stroke-width="4"/>

    <!-- Spine line -->
    <line x1="0" y1="-226" x2="0" y2="186" stroke="#e0dcd6" stroke-width="3" opacity="0.7"/>

    <!-- === LEFT PAGE: Botanical Sakura === -->
    <g transform="translate(-134, -16)">
      <!-- 5-petal sakura blossom -->
      <!-- Petal 1 (top) -->
      <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.85"/>
      <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.3"/>
      <!-- Petal notch (sakura characteristic) -->
      <circle cx="0" cy="-112" r="8" fill="url(#page)"/>

      <!-- Petal 2 (top-right) -->
      <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.85" transform="rotate(72)"/>
      <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.3" transform="rotate(72)"/>
      <circle cx="0" cy="-112" r="8" fill="url(#page)" transform="rotate(72)"/>

      <!-- Petal 3 (bottom-right) -->
      <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.82" transform="rotate(144)"/>
      <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.28" transform="rotate(144)"/>
      <circle cx="0" cy="-112" r="8" fill="url(#page)" transform="rotate(144)"/>

      <!-- Petal 4 (bottom-left) -->
      <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.82" transform="rotate(216)"/>
      <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.28" transform="rotate(216)"/>
      <circle cx="0" cy="-112" r="8" fill="url(#page)" transform="rotate(216)"/>

      <!-- Petal 5 (top-left) -->
      <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.85" transform="rotate(288)"/>
      <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.3" transform="rotate(288)"/>
      <circle cx="0" cy="-112" r="8" fill="url(#page)" transform="rotate(288)"/>

      <!-- Stamen center -->
      <circle cx="0" cy="0" r="22" fill="#d4a645" opacity="0.65"/>
      <circle cx="0" cy="0" r="12" fill="#f5e6a3" opacity="0.9"/>
      <!-- Stamen dots -->
      <circle cx="-8" cy="-6" r="3" fill="#c8963a" opacity="0.4"/>
      <circle cx="6" cy="-8" r="2.5" fill="#c8963a" opacity="0.35"/>
      <circle cx="4" cy="7" r="3" fill="#c8963a" opacity="0.3"/>

      <!-- Thin stem -->
      <path d="M0 22 Q-8 60 -12 100" stroke="#9fb69f" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Small leaf on stem -->
      <path d="M-12 80 Q-32 68 -40 78 Q-28 76 -12 80" fill="#c1e8d8" opacity="0.7"/>
      <path d="M-12 80 Q-30 72 -40 78" stroke="#9fb69f" stroke-width="1" fill="none" opacity="0.5"/>
    </g>

    <!-- === RIGHT PAGE: Field Notes === -->
    <g opacity="0.4">
      <!-- Handwritten-style lines -->
      <rect x="40" y="-170" width="180" height="5" rx="2" fill="#e0dcd6"/>
      <rect x="40" y="-140" width="156" height="5" rx="2" fill="#e0dcd6"/>
      <rect x="40" y="-110" width="192" height="5" rx="2" fill="#e0dcd6"/>
      <rect x="40" y="-80" width="120" height="5" rx="2" fill="#e0dcd6"/>
      <rect x="40" y="-50" width="168" height="5" rx="2" fill="#e0dcd6"/>
    </g>

    <!-- Pixel leaf accent on right page (subtle) -->
    <g opacity="0.45" transform="translate(72, 40)">
      <rect x="0" y="0" width="14" height="14" fill="#c1e8d8" rx="2"/>
      <rect x="14" y="0" width="14" height="14" fill="#9fb69f" rx="2"/>
      <rect x="0" y="14" width="14" height="14" fill="#9fb69f" rx="2"/>
      <rect x="14" y="14" width="14" height="14" fill="#c1e8d8" rx="2"/>
      <rect x="28" y="14" width="14" height="14" fill="#c1e8d8" rx="2" opacity="0.5"/>
      <rect x="28" y="0" width="14" height="14" fill="#c1e8d8" rx="2" opacity="0.3"/>
    </g>

    <!-- Small date notation -->
    <text x="152" y="60" font-family="'Courier New', monospace" font-size="18" fill="#bbb" letter-spacing="1">2026.03</text>
  </g>

  <!-- Floating petals outside book -->
  <ellipse cx="780" cy="180" rx="28" ry="44" fill="#f5d5d0" opacity="0.3" transform="rotate(25 780 180)"/>
  <ellipse cx="200" cy="760" rx="20" ry="32" fill="#f5d5d0" opacity="0.22" transform="rotate(-18 200 760)"/>
  <ellipse cx="830" cy="700" rx="16" ry="24" fill="#f5d5d0" opacity="0.18" transform="rotate(40 830 700)"/>

  <!-- Brand text: 花図鉑 -->
  <text x="512" y="830" text-anchor="middle" font-family="Georgia, 'Hiragino Mincho ProN', 'Yu Mincho', serif" font-size="56" fill="#D4537E" letter-spacing="12" font-weight="400">花図鉑</text>
</svg>
