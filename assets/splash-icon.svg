<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <!-- Background matches app.json splash.backgroundColor -->
  <rect width="1284" height="2778" fill="#f5f4f1"/>

  <defs>
    <linearGradient id="splBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f6f3"/>
      <stop offset="100%" stop-color="#ede9e3"/>
    </linearGradient>
    <linearGradient id="splPage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf8f5"/>
    </linearGradient>
  </defs>

  <!-- Center the icon artwork (no rounded rect clipping for splash) -->
  <g transform="translate(642, 1200)">
    <!-- Journal book -->
    <g transform="scale(1.3)">
      <rect x="-268" y="-226" width="536" height="412" rx="28" fill="#d8d4ce" opacity="0.3" transform="translate(6, 8)"/>
      <rect x="-268" y="-226" width="536" height="412" rx="28" fill="url(#splPage)" stroke="#e0dcd6" stroke-width="3"/>
      <line x1="0" y1="-226" x2="0" y2="186" stroke="#e0dcd6" stroke-width="2.5" opacity="0.7"/>

      <!-- Left page: sakura -->
      <g transform="translate(-134, -16)">
        <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.85"/>
        <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.3"/>
        <circle cx="0" cy="-112" r="8" fill="url(#splPage)"/>
        <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.85" transform="rotate(72)"/>
        <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.3" transform="rotate(72)"/>
        <circle cx="0" cy="-112" r="8" fill="url(#splPage)" transform="rotate(72)"/>
        <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.82" transform="rotate(144)"/>
        <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.28" transform="rotate(144)"/>
        <circle cx="0" cy="-112" r="8" fill="url(#splPage)" transform="rotate(144)"/>
        <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.82" transform="rotate(216)"/>
        <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.28" transform="rotate(216)"/>
        <circle cx="0" cy="-112" r="8" fill="url(#splPage)" transform="rotate(216)"/>
        <ellipse cx="0" cy="-80" rx="40" ry="64" fill="#f5d5d0" opacity="0.85" transform="rotate(288)"/>
        <ellipse cx="0" cy="-56" rx="22" ry="40" fill="#e8a5b0" opacity="0.3" transform="rotate(288)"/>
        <circle cx="0" cy="-112" r="8" fill="url(#splPage)" transform="rotate(288)"/>
        <circle cx="0" cy="0" r="22" fill="#d4a645" opacity="0.65"/>
        <circle cx="0" cy="0" r="12" fill="#f5e6a3" opacity="0.9"/>
        <path d="M0 22 Q-8 60 -12 100" stroke="#9fb69f" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M-12 80 Q-32 68 -40 78 Q-28 76 -12 80" fill="#c1e8d8" opacity="0.7"/>
      </g>

      <!-- Right page: field notes -->
      <g opacity="0.4">
        <rect x="40" y="-170" width="180" height="5" rx="2" fill="#e0dcd6"/>
        <rect x="40" y="-140" width="156" height="5" rx="2" fill="#e0dcd6"/>
        <rect x="40" y="-110" width="192" height="5" rx="2" fill="#e0dcd6"/>
        <rect x="40" y="-80" width="120" height="5" rx="2" fill="#e0dcd6"/>
      </g>

      <!-- Pixel accent -->
      <g opacity="0.4" transform="translate(72, 40)">
        <rect x="0" y="0" width="14" height="14" fill="#c1e8d8" rx="2"/>
        <rect x="14" y="0" width="14" height="14" fill="#9fb69f" rx="2"/>
        <rect x="0" y="14" width="14" height="14" fill="#9fb69f" rx="2"/>
        <rect x="14" y="14" width="14" height="14" fill="#c1e8d8" rx="2"/>
      </g>
    </g>
  </g>

  <!-- Brand text below artwork -->
  <text x="642" y="1560" text-anchor="middle" font-family="Georgia, 'Hiragino Mincho ProN', 'Yu Mincho', serif" font-size="72" fill="#D4537E" letter-spacing="16" font-weight="400">花図鉑</text>
  <text x="642" y="1620" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#aaaaaa" letter-spacing="6">PIXEL HERBARIUM</text>

  <!-- Floating petals -->
  <ellipse cx="980" cy="900" rx="24" ry="38" fill="#f5d5d0" opacity="0.2" transform="rotate(20 980 900)"/>
  <ellipse cx="280" cy="1700" rx="18" ry="28" fill="#f5d5d0" opacity="0.15" transform="rotate(-15 280 1700)"/>
</svg>
